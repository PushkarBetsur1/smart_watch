[env:xiaonrf52840]
platform = nordicnrf52
board = xiaonrf52840
framework = arduino

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit BusIO@^1.16.1

monitor_speed = 115200

build_flags =
    -DARDUINO_NRF52_ADAFRUIT
    -Os

build_src_filter =
    +<*>
    +<hal/*>
    +<app/*>
